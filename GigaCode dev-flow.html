      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    // would push the parser into quirks mode. DOMParser always emits a <head>

t:700;color:#e8ecf6}\n  .gitem .gx{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.35}\n\n  .big{font-size:74px;font-weight:800;letter-spacing:-2px;line-height:1}\n  .big .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}\n\n  /* DASHBOARD */\n  .dash{background:#0b0e16;border:1px solid var(--line2);border-radius:18px;padding:16px;flex:1;display:flex;flex-direction:column;gap:9px;min-height:0;box-shadow:0 30px 80px rgba(0,0,0,.4)}\n  .dash-top{display:flex;justify-content:space-between;align-items:center}\n  .dash-top .title{font-weight:800;font-size:15px;display:flex;align-items:center;gap:9px}\n  .dash-top .title .dot{width:11px;height:11px;border-radius:3px;background:var(--grad)}\n  .dash-top .live{font-size:12px;color:var(--mint);display:flex;align-items:center;gap:7px}\n  .dash-top .live .b{width:8px;height:8px;border-radius:50%;background:var(--mint);animation:pulse 1.6s infinite}\n  .hot[data-pop]{cursor:pointer;transition:.15s;position:relative}\n  .hot[data-pop]:hover{filter:brightness(1.18)}\n  .hot[data-pop]::after{content:\"?\";position:absolute;top:-7px;right:-7px;width:17px;height:17px;border-radius:50%;background:var(--violet);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s;box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:2}\n  .dash:hover .hot[data-pop]::after{opacity:.9}\n  .now{background:linear-gradient(120deg,rgba(79,227,193,.1),rgba(35,196,131,.1));border:1px solid rgba(79,227,193,.25);border-radius:12px;padding:9px 16px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}\n  .now .l{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}\n  .now .v{font-weight:700;font-size:15px}\n  .now .v .file{color:var(--mint)}\n  .phases{display:flex;gap:8px;align-items:stretch}\n  .ph{flex:1;border:1px solid var(--line);border-radius:11px;padding:8px 9px;background:var(--panel);text-align:center;position:relative}\n  .ph.done{border-color:rgba(79,227,193,.4)}\n  .ph.cur{border-color:var(--mint);background:linear-gradient(180deg,rgba(79,227,193,.14),rgba(79,227,193,.04));box-shadow:0 0 0 1px rgba(79,227,193,.3)}\n  .ph.imp{border-style:dashed}\n  .ph .nm{font-weight:700;font-size:13px}\n  .ph .st{font-size:11px;color:var(--dim);margin-top:3px}\n  .ph.done .st{color:var(--mint)}\n  .ph-sep{align-self:center;color:var(--dim);font-size:13px}\n  .row2{display:grid;grid-template-columns:1.5fr 1fr;gap:11px;min-height:0;align-items:stretch}\n  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 13px}\n  .panel .ph-h{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--violet);font-weight:700;margin-bottom:9px}\n  .bind{display:flex;flex-direction:column;gap:7px}\n  .bindrow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:8px 10px;border-radius:9px;background:#0b0e16;border:1px solid var(--line)}\n  .bindrow.cur{border-color:var(--mint)}\n  .bindrow.done{opacity:.9}\n  .bp{font-weight:700;font-size:12.5px;min-width:96px;color:var(--txt)}\n  .bt{font-family:monospace;font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--line);color:#cdd6ea}\n  .bt.os{color:var(--mint);border-color:rgba(79,227,193,.3)}\n  .bt.art{color:var(--amber);border-color:rgba(255,194,75,.3)}\n  .bind-leg{font-size:11px;color:var(--dim);margin-top:9px;display:flex;gap:14px}\n  .bind-leg b{font-weight:700}\n  .vitals{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}\n  .vital{background:#0b0e16;border:1px solid var(--line);border-radius:10px;padding:6px 9px;text-align:center}\n  .vital .num{font-size:17px;font-weight:800}\n  .vital .lbl{font-size:11px;color:var(--dim);margin-top:2px}\n  .vital.block .num{color:#ff9b9b}.vital.ask .num{color:var(--amber)}.vital.allow .num{color:var(--mint)}.vital.idle .num{color:var(--violet)}\n  .gates{display:flex;gap:7px;flex-wrap:wrap}\n  .gate{font-size:11px;padding:5px 9px;border-radius:8px;border:1px solid var(--line);font-family:monospace;display:flex;align-items:center;gap:6px}\n  .gate .led{width:8px;height:8px;border-radius:50%}\n  .gate.allow .led{background:var(--mint)}.gate.ask .led{background:var(--amber)}.gate.block .led{background:var(--red)}.gate.idle .led{background:#444c63}\n  .gate.allow{border-color:rgba(79,227,193,.3)}.gate.ask{border-color:rgba(255,194,75,.3)}\n  .budget-bar{height:8px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:6px}\n  .budget-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--mint),var(--amber));width:40%}\n\n  /* popup */\n  .pop-overlay{position:fixed;inset:0;background:rgba(5,7,12,.72);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:30px;animation:fade .2s both}\n  .pop-overlay.show{display:flex}\n  .pop{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line2);border-radius:18px;max-width:580px;width:100%;padding:26px 28px;position:relative;box-shadow:0 40px 120px rgba(0,0,0,.6);animation:popin .25s cubic-bezier(.2,.8,.2,1) both}\n  @keyframes popin{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}\n  .pop .x{position:absolute;top:16px;right:18px;cursor:pointer;color:var(--dim);font-size:22px;line-height:1}\n  .pop .x:hover{color:var(--txt)}\n  .pop .pk{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--violet);font-weight:700;margin-bottom:8px}\n  .pop h3{font-size:23px;font-weight:800;margin-bottom:12px;letter-spacing:-.4px}\n  .pop p{color:var(--muted);font-size:15px;line-height:1.62;margin-bottom:12px}\n  .pop .meta{background:#080a10;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13.5px;color:var(--muted)}\n  .pop .meta b{color:var(--txt)}.pop .meta code{color:var(--mint);font-family:monospace}\n\n  .demo-banner{border:1px dashed rgba(255,194,75,.5);background:rgba(255,194,75,.06);border-radius:14px;padding:18px 22px;display:flex;align-items:center;gap:16px;margin-top:18px}\n  .demo-banner .em{font-size:30px}\n  .demo-banner .t{font-weight:700;font-size:16px;color:var(--amber)}\n  .demo-banner .d{font-size:14px;color:var(--muted)}\n  .tip{font-size:12.5px;color:var(--dim);margin-top:10px;display:flex;align-items:center;gap:7px}\n  .demo-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border:2px dashed var(--line2);border-radius:22px;margin-top:10px;background:radial-gradient(700px 300px at 50% 30%,rgba(79,227,193,.08),transparent 70%)}\n  .demo-stage .play{width:90px;height:90px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:38px;color:#0a0c12;margin-bottom:18px;box-shadow:0 20px 60px rgba(15,169,104,.4)}\n  .demo-stage .url{font-family:monospace;color:var(--mint);font-size:16px;margin-top:8px;border:1px solid var(--line2);padding:8px 16px;border-radius:10px;background:#0b0e16}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"topbar\"><div class=\"fill\" id=\"fill\"><\u002Fdiv><\u002Fdiv>\n<div class=\"brand\"><span class=\"dot\"><\u002Fspan>GigaCode <small>· dev-flow<\u002Fsmall><\u002Fdiv>\n<div class=\"counter\"><span id=\"cur\">1<\u002Fspan> / <span id=\"tot\">13<\u002Fspan><\u002Fdiv>\n\n<div class=\"deck\" id=\"deck\">\n\n<!-- 1 · TITLE -->\n<section class=\"slide active center\" style=\"justify-content:center\">\n  <div class=\"kicker\"><span class=\"pulse\"><\u002Fspan>Демо + разбор флоу · ~20 минут<\u002Fdiv>\n  <h1>Управляемый флоу разработки<br><span class=\"g\">GigaCode<\u002Fspan> со встроенным OpenSpec<\u002Fh1>\n  <p class=\"sub\">Как обычная агентная сессия превращается в детерминированный процесс: фиксированные стадии, машинный вердикт, спека как источник истины — и живой обсервер, привязанный к текущему этапу флоу.<\u002Fp>\n  <div class=\"pill-row\">\n    <span class=\"pill\">intake → contract → plan → implement → delivery<\u002Fspan>\n    <span class=\"pill\">OpenSpec · спека-истина<\u002Fspan>\n    <span class=\"pill\">гейты блокируют, эвристики подсказывают<\u002Fspan>\n    <span class=\"pill\">observer · live<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 2 · PROBLEM -->\n<section class=\"slide\">\n  <div class=\"slide-head\">\n    <div class=\"eyebrow\">Проблема, которую решали<\u002Fdiv>\n    <h2>Агенты <span class=\"g\">забывают и игнорируют<\u002Fspan> инструкции<\u002Fh2>\n    <p class=\"sub\">В длинном контексте модель теряет правила и «срезает углы». Это особенно критично, когда флоу <strong>последователен<\u002Fstrong>: порядок фаз и артефактов важен, и один пропущенный шаг ломает всё ниже по цепочке.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"grid g3\" style=\"flex:1;align-content:start\">\n    <div class=\"card\"><span class=\"ic\">🧠<\u002Fspan><h3>Забывают и игнорируют<\u002Fh3><p>Инструкции тонут в контексте. Агент пропускает шаг, делает правку раньше спеки, «оптимизирует» процесс по-своему.<\u002Fp><\u002Fdiv>\n    <div class=\"card\"><span class=\"ic\">🔢<\u002Fspan><h3>Порядок фаз критичен<\u002Fh3><p>Флоу строго последователен: пропущенная спека или несозданный артефакт делают всё дальнейшее недостоверным.<\u002Fp><\u002Fdiv>\n    <div class=\"card\"><span class=\"ic\">😮‍💨<\u002Fspan><h3>Ручная проверка изматывает<\u002Fh3><p>Следить за каждым шагом агента вручную невозможно — это изматывает и ведёт к выгоранию. Контроль должен быть автоматическим, а не держаться на внимании человека.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"note\">Вывод: <strong>напоминать агенту мало<\u002Fstrong> — нужен механизм, который не зависит от того, «вспомнил» агент инструкцию или нет.<\u002Fp>\n<\u002Fsection>\n\n<!-- 3 · ANSWER -->\n<section class=\"slide\">\n  <div class=\"slide-head\">\n    <div class=\"eyebrow\">Ответ GigaCode<\u002Fdiv>\n    <h2>Процесс <span class=\"g\">держится на машине<\u002Fspan>, а не на доверии<\u002Fh2>\n    <p class=\"sub\">Хуки превращают обычную сессию в управляемый процесс. <strong>Детерминированные гейты<\u002Fstrong> (git-safety, порядок стадий, структура спеки, линтер, сборка) — <span class=\"badge b-block\">блокируют<\u002Fspan>. <strong>Эвристики<\u002Fstrong> — только <span class=\"badge b-adv\">подсказывают<\u002Fspan>.<\u002Fp>\n  <\u002Fdiv>\n  <table>\n    <tbody><tr><th>Боль<\u002Fth><th>Что её снимает<\u002Fth><\u002Ftr>\n    <tr><td><strong>Агент забывает / игнорирует<\u002Fstrong><\u002Ftd><td>Гейт <b>блокирует<\u002Fb> действие независимо от «памяти» агента — правило исполняется кодом, а не промптом.<\u002Ftd><\u002Ftr>\n    <tr><td><strong>Нарушается порядок фаз<\u002Fstrong><\u002Ftd><td><code>gate_stage_order<\u002Fcode> + фиксированные стадии: следующая фаза не открывается, пока предыдущая не завершена и не подтверждена.<\u002Ftd><\u002Ftr>\n    <tr><td><strong>Артефакты не созданы<\u002Fstrong><\u002Ftd><td><code>validate_development_output<\u002Fcode> на <code>Stop<\u002Fcode> не выпускает прогон без полных артефактов и валидных changes.<\u002Ftd><\u002Ftr>\n    <tr><td><strong>Ручной контроль изматывает<\u002Fstrong><\u002Ftd><td>Машинный <b>вердикт<\u002Fb> вместо самоодобрения + живой <b>обсервер<\u002Fb> вместо ручного слежения за каждым шагом.<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- 4 · SWIMLANES -->\n<section class=\"slide\">\n  <div class=\"slide-head\" style=\"margin-bottom:16px\">\n    <div class=\"eyebrow\">Флоу · режим implement<\u002Fdiv>\n    <h2>Основной трек, OpenSpec и артефакты — параллельно<\u002Fh2>\n    <p class=\"sub\">Сверху — пять фиксированных стадий. Под каждой: что в этот момент происходит в OpenSpec и какой артефакт формируется.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"lanes\">\n    <div class=\"lane-lbl\">Трек<\u002Fdiv>\n    <div class=\"lane-cell track\"><div class=\"tn\">01 · 👤<\u002Fdiv><div class=\"tt\">intake<\u002Fdiv><\u002Fdiv>\n    <div class=\"lane-cell track\"><div class=\"tn\">02 · 👤<\u002Fdiv><div class=\"tt\">contract<\u002Fdiv><\u002Fdiv>\n    <div class=\"lane-cell track\"><div class=\"tn\">03 · 🛑 plan-only<\u002Fdiv><div class=\"tt\">plan<\u002Fdiv><\u002Fdiv>\n    <div class=\"lane-cell track imp cyc\"><div class=\"tn\">04 · ⚙️ ↻ цикл<\u002Fdiv><div class=\"tt\">implement<\u002Fdiv><div class=\"cyctag\">бюджет 2 блока<\u002Fdiv><\u002Fdiv>\n    <div class=\"lane-cell track\"><div class=\"tn\">05 · 🤖 вердикт<\u002Fdiv><div class=\"tt\">delivery<\u002Fdiv><\u002Fdiv>\n\n    <div class=\"lane-lbl\" style=\"color:var(--mint)\">OpenSpec<\u002Fdiv>\n    <div class=\"lane-cell os\"><span class=\"mut\">—<\u002Fspan> сбор вводных, спеки ещё нет<\u002Fdiv>\n    <div class=\"lane-cell os\"><span class=\"mut\">—<\u002Fspan> фиксация scope<\u002Fdiv>\n    <div class=\"lane-cell os\"><b style=\"color:var(--txt)\">propose<\u002Fb> → change-папка; <code>validate --strict<\u002Fcode><\u002Fdiv>\n    <div class=\"lane-cell os\"><b style=\"color:var(--txt)\">apply<\u002Fb> → правки по спеке, <code>tasks.md<\u002Fcode> N/M<\u002Fdiv>\n    <div class=\"lane-cell os\"><b style=\"color:var(--txt)\">archive<\u002Fb> → дельты в <code>openspec/specs/<\u002Fcode><\u002Fdiv>\n\n    <div class=\"lane-lbl\" style=\"color:var(--amber)\">Артефакты<\u002Fdiv>\n    <div class=\"lane-cell art\"><code>intake.json<\u002Fcode><\u002Fdiv>\n    <div class=\"lane-cell art\"><code>contract.json<\u002Fcode> <span class=\"mut\">frozen<\u002Fspan><\u002Fdiv>\n    <div class=\"lane-cell art\"><code>changes/&lt;id&gt;/*<\u002Fcode> + <code>journal.md<\u002Fcode><\u002Fdiv>\n    <div class=\"lane-cell art\">код (feature-ветка) + <code>decisions.jsonl<\u002Fcode><\u002Fdiv>\n    <div class=\"lane-cell art\"><code>verdict.json<\u002Fcode> · <code>verification.md<\u002Fcode> · <code>pr-summary.md<\u002Fcode><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"cycle-note\">\n    <span class=\"loop\">↻<\u002Fspan>\n    <div><strong>implement — циклична.<\u002Fstrong> Каждая правка проходит гейты; на <code style=\"color:var(--mint)\">Stop<\u002Fcode> проверки могут вернуть <span class=\"badge b-block\" style=\"margin:0 2px\">block<\u002Fspan> → агент чинит и повторяет проход. Stop-блоки <strong>постоянны и не деградируют в allow<\u002Fstrong>: застрявший прогон разрешает человек. <code style=\"color:var(--mint)\">stop_block_budget = 2<\u002Fcode> — счётчик попыток самоисправления, по которому виден выход на эскалацию.<\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"note\" style=\"margin-top:12px\">По умолчанию — <strong>plan-only<\u002Fstrong> (анализ и план без правок). <code style=\"color:var(--mint)\">implement<\u002Fcode> — явно или после согласования. Между стадиями — человеческие чекпойнты (<code style=\"color:var(--mint)\">confirm.py<\u002Fcode>, самоодобрение закрыто); доставка открывается только реальным <code style=\"color:var(--mint)\">pass<\u002Fcode>.<\u002Fp>\n<\u002Fsection>\n\n<!-- 5 · CONVEYOR -->\n<section class=\"slide\">\n  <div class=\"slide-head\">\n    <div class=\"eyebrow\">Флоу · под капотом<\u002Fdiv>\n    <h2>Конвейер агентов<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"codeblock\" style=\"font-size:15px;text-align:center;padding:22px\">\n    <span class=\"s\">intake<\u002Fspan> <span class=\"c\">(главная сессия)<\u002Fspan> → <span class=\"s\">repo-context<\u002Fspan> → <span class=\"p\">OpenSpec propose<\u002Fspan>\n    <br><span class=\"c\">→ [STOP в plan-only] →<\u002Fspan> <span class=\"s\">coder<\u002Fspan> → <span class=\"s\">verifier<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"grid g2\" style=\"margin-top:18px\">\n    <div class=\"card\"><span class=\"ic\">🧭<\u002Fspan><h3>repo-context<\u002Fh3><p>Собирает project intelligence и карту влияния. Для нашего стека критично — карта событийных потоков <code style=\"color:var(--mint)\">producer → topic → consumer<\u002Fcode>, потому что Kafka разрывает статический call-graph.<\u002Fp><\u002Fdiv>\n    <div class=\"card\"><span class=\"ic\">📐<\u002Fspan><h3>OpenSpec propose<\u002Fh3><p>Спека оформляется как OpenSpec-change и <strong>не идёт в работу<\u002Fstrong>, пока <code style=\"color:var(--mint)\">openspec validate --strict<\u002Fcode> не зелёный.<\u002Fp><\u002Fdiv>\n    <div class=\"card\"><span class=\"ic\">⌨️<\u002Fspan><h3>coder<\u002Fh3><p>Получает найденные существующие символы по зоне задачи и обязан выполнить <strong>Search Before Create<\u002Fstrong> перед каждым новым классом/функцией/модулем.<\u002Fp><\u002Fdiv>\n    <div class=\"card\"><span class=\"ic\">🔬<\u002Fspan><h3>verifier<\u002Fh3><p>Гоняет проверки, фиксирует доказательства, готовит PR-сводку. Анти-паттерны асинхронных тестов — на уровне advisory.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 6 · OPENSPEC INTEGRATION (clear) -->\n<section class=\"slide\">\n  <div class=\"slide-head\">\n    <div class=\"eyebrow\">Интеграция OpenSpec<\u002Fdiv>\n    <h2>Как OpenSpec <span class=\"g\">встроен в наш флоу<\u002Fspan><\u002Fh2>\n    <p class=\"sub\">OpenSpec — наш spec-движок. Главное — не сам формат, а то, что он стал <strong>обязательной частью процесса<\u002Fstrong>, а не рекомендацией.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"split\" style=\"align-items:start\">\n    <div>\n      <ul class=\"clean\">\n        <li><strong>Встроен в шаблон.<\u002Fstrong> Сгенерированные скиллы и команды <code style=\"color:var(--mint)\">/opsx:*<\u002Fcode> + <code style=\"color:var(--mint)\">openspec/config.yaml<\u002Fcode> копируются в каждый dev-репозиторий вместе с шаблоном.<\u002Fli>\n        <li><strong>Две зоны — их нельзя путать.<\u002Fstrong> Авторитетная спека — в <code style=\"color:var(--mint)\">openspec/changes/&lt;id&gt;/<\u002Fcode>; человекочитаемые run-notes — в <code style=\"color:var(--mint)\">docs/development/&lt;slug&gt;/<\u002Fcode>.<\u002Fli>\n        <li><strong>Команды ведут цикл.<\u002Fstrong> <code style=\"color:var(--mint)\">/develop-feature<\u002Fcode> и <code style=\"color:var(--mint)\">/fix-bug<\u002Fcode> ведут change через propose → apply → archive.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"border-color:rgba(79,227,193,.3)\">\n      <span class=\"ic\">🔒<\u002Fspan>\n      <h3>Формат принуждается гейтами<\u002Fh3>\n      <p style=\"margin-bottom:10px\"><code style=\"color:var(--mint)\">gate_spec_structure<\u002Fcode> на <code>PostToolUse<\u002Fcode> — <strong>strict-валидация<\u002Fstrong> change при каждой записи.<\u002Fp>\n      <p style=\"margin-bottom:10px\"><code style=\"color:var(--mint)\">Stop<\u002Fcode> не выпускает прогон, пока <code style=\"color:var(--mint)\">openspec validate --strict<\u002Fcode> не зелёный и changes не валидны.<\u002Fp>\n      <p>Прямая правка спеки-истины (<code style=\"color:var(--mint)\">openspec/specs<\u002Fcode>) — всегда <span class=\"badge b-ask\">ask<\u002Fspan>, выносится на решение человека.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 7 · RULES & ADAPTATION -->\n<section class=\"slide\">\n  <div class=\"slide-head\">\n    <div class=\"eyebrow\">Адаптация под проект<\u002Fdiv>\n    <h2>Один шаблон → <span class=\"g\">конвенции вашей команды<\u002Fspan><\u002Fh2>\n    <p class=\"sub\">Гейты универсальны и не содержат языковой специфики. Всё, что зависит от проекта, вынесено в два места — их правит команда под свой стек.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"split\" style=\"align-items:start\">\n    <div class=\"card\">\n      <span class=\"ic\">📜<\u002Fspan><h3><code style=\"color:var(--mint)\">rules/<\u002Fcode> — конвенции в контекст<\u002Fh3>\n      <p style=\"margin-bottom:10px\">Из 7 файлов-правил <strong>4 внедряются в контекст<\u002Fstrong> агента на старте сессии (через <code style=\"color:var(--mint)\">gate_context_inject<\u002Fcode>, список в <code style=\"color:var(--mint)\">RULE_FILES<\u002Fcode>); <code style=\"color:var(--mint)\">coder<\u002Fcode> дополнительно получает <code>code-style<\u002Fcode> и <code>testing<\u002Fcode> — агент читает их <em>перед<\u002Fem> генерацией кода.<\u002Fp>\n      <div class=\"pill-row\" style=\"margin-top:0\">\n        <span class=\"pill\" style=\"border-color:rgba(79,227,193,.45);color:var(--mint)\">development-flow<\u002Fspan><span class=\"pill\" style=\"border-color:rgba(79,227,193,.45);color:var(--mint)\">code-style<\u002Fspan><span class=\"pill\" style=\"border-color:rgba(79,227,193,.45);color:var(--mint)\">testing<\u002Fspan><span class=\"pill\" style=\"border-color:rgba(79,227,193,.45);color:var(--mint)\">openspec<\u002Fspan>\n        <span class=\"pill\">git-safety<\u002Fspan><span class=\"pill\">branch-naming<\u002Fspan><span class=\"pill\">language-policy<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin-top:10px;font-size:12.5px;color:var(--dim)\">Мятные — внедряются в контекст; <code>git-safety<\u002Fcode> и <code>branch-naming<\u002Fcode> исполняются гейтами напрямую, <code>language-policy<\u002Fcode> — справочный образец. Все 7 — образцы с дефолтами под Kotlin+Java, правятся под конвенции команды.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <span class=\"ic\">⚙️<\u002Fspan><h3><code style=\"color:var(--mint)\">quality-gates.json<\u002Fcode> — команды стека<\u002Fh3>\n      <p style=\"margin-bottom:8px\">Конкретика проверок — в одном JSON, не в коде гейтов:<\u002Fp>\n      <div class=\"codeblock\" style=\"margin-top:0;font-size:12.5px\">{\n  <span class=\"s\">\"lint\"<\u002Fspan>:  <span class=\"p\">\"./gradlew detekt ktlintCheck\"<\u002Fspan>,\n  <span class=\"s\">\"build\"<\u002Fspan>: <span class=\"p\">\"./gradlew build -x test\"<\u002Fspan>,\n  <span class=\"s\">\"test\"<\u002Fspan>:  <span class=\"p\">\"./gradlew test\"<\u002Fspan>,\n  <span class=\"s\">\"clean_code\"<\u002Fspan>: { файл ≤400, функция ≤60,\n                 маркеры TODO/FIXME/XXX }\n}<\u002Fdiv>\n      <p style=\"margin-top:10px;font-size:13.5px;color:var(--dim)\">Сменили стек — поменяли один файл; гейты <code style=\"color:var(--mint)\">gate_lint<\u002Fcode>/<code style=\"color:var(--mint)\">gate_build<\u002Fcode>/<code style=\"color:var(--mint)\">gate_clean_code<\u002Fcode> остаются те же.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 8 · ROUTER + GIT_GUARD -->\n<section class=\"slide\">\n  <div class=\"slide-head\">\n    <div class=\"eyebrow\">Движок процесса · 1/2<\u002Fdiv>\n    <h2>Роутер хуков и <span class=\"g\">git_guard<\u002Fspan><\u002Fh2>\n    <p class=\"sub\">Один диспетчер на все события и отдельный страж git-операций — фундамент, на котором держится принуждение.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"split\" style=\"align-items:start\">\n    <div class=\"card\">\n      <span class=\"ic\">🧭<\u002Fspan><h3><code style=\"color:var(--mint)\">router.py<\u002Fcode> — единый диспетчер<\u002Fh3>\n      <ul class=\"clean\" style=\"margin-top:8px\">\n        <li>Зарегистрирован <strong>один раз на каждое событие<\u002Fstrong>; по <code style=\"color:var(--mint)\">router.config.json<\u002Fcode> находит гейты и гоняет их in-process.<\u002Fli>\n        <li>Агрегирует решения по приоритету <code style=\"color:var(--mint)\">block &gt; ask &gt; allow<\u002Fcode> и <strong>журналирует каждое<\u002Fstrong> в <code style=\"color:var(--mint)\">decisions.jsonl<\u002Fcode>.<\u002Fli>\n        <li>Нормализует tool-id: GigaCode шлёт «сырые» имена (<code>run_shell_command<\u002Fcode>, <code>write_file<\u002Fcode>), в т.ч. shell MCP-серверов (Serena <code>execute_shell_command<\u002Fcode>) → приводит к <code>Bash<\u002Fcode>, чтобы safety-route сработал.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <span class=\"ic\">🛡️<\u002Fspan><h3><code style=\"color:var(--mint)\">git_guard<\u002Fcode> — fail-closed страж<\u002Fh3>\n      <ul class=\"clean\" style=\"margin-top:8px\">\n        <li>Ловит деструктивный git и правки сквозь <strong>обёртки, цепочки, кавычки, env-префиксы и редиректы<\u002Fstrong>. <code>cd x &amp;&amp; /usr/bin/git.exe reset --hard<\u002Fcode> ловится как <code>git reset --hard<\u002Fcode>.<\u002Fli>\n        <li><strong>Defense-in-depth:<\u002Fstrong> любая не-read-only команда, лишь <em>упоминающая<\u002Fem> <code>.gigacode<\u002Fcode>/<code>.git<\u002Fcode>, блокируется — детектор не зависит от идеального парсинга shell.<\u002Fli>\n        <li><code>.gigacode/**<\u002Fcode> и спека-истина → <span class=\"badge b-block\">block<\u002Fspan>; CI/secrets/infra (<code>.github/workflows<\u002Fcode>, <code>Jenkinsfile<\u002Fcode>, <code>terraform<\u002Fcode>, <code>.env<\u002Fcode>) → <span class=\"badge b-ask\">ask<\u002Fspan>; protected-ветки → <span class=\"badge b-block\">block<\u002Fspan>.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 9 · TREE INFOGRAPHIC (expanded) -->\n<section class=\"slide\" style=\"padding:34px 46px 56px\">\n  <div class=\"slide-head\" style=\"margin-bottom:8px\">\n    <div class=\"eyebrow\">Движок процесса · 2/2<\u002Fdiv>\n    <h2>Дерево проверок <span style=\"font-size:15px;color:var(--dim);font-weight:500\">— что делает каждый гейт<\u002Fspan><\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"tree\" style=\"gap:8px\">\n    <div class=\"tree-root\" style=\"padding:9px 20px\">\n      <div class=\"rn\">router.py<\u002Fdiv>\n      <div class=\"rd\">block &gt; ask &gt; allow · журналирует в <code style=\"color:var(--mint);font-family:monospace\">decisions.jsonl<\u002Fcode> · stop_block_budget = 2<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tcols\">\n      <div class=\"tcol\">\n        <div class=\"tcol-h\"><span class=\"evnum\">1<\u002Fspan>Старт<span class=\"ev2\">Session/Prompt/Subagent<\u002Fspan><\u002Fdiv>\n        <div class=\"gitem bk\"><div class=\"gn\">preflight_check<\u002Fdiv><div class=\"gx\">Блокирует dev-запрос без минимальных вводных — чтобы агент уточнял, а не фантазировал.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem inj\"><div class=\"gn\">gate_context_inject<\u002Fdiv><div class=\"gx\">Внедряет правила <code>rules/<\u002Fcode>, карту модулей и активные OpenSpec-changes. Задаёт агенту контекст до генерации. Никогда не блокирует.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tcol\">\n        <div class=\"tcol-h\"><span class=\"evnum\">2<\u002Fspan>Перед записью<span class=\"sc\">⛔<\u002Fspan><\u002Fdiv>\n        <div class=\"gitem bk\"><div class=\"gn\">git_guard<\u002Fdiv><div class=\"gx\">Деструктивный git, protected-ветки, правки <code>.gigacode<\u002Fcode>/спеки — сквозь обёртки, цепочки и редиректы. Fail-closed.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem bk\"><div class=\"gn\">gate_stage_order<\u002Fdiv><div class=\"gx\">Запись в артефакт стадии — только когда выполнены entry_requires предыдущей. Подтверждения читает из артефактов, не из статуса.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem as\"><div class=\"gn\">gate_spec_structure<\u002Fdiv><div class=\"gx\">Ask на прямую правку <code>openspec/specs<\u002Fcode> и <code>changes/archive<\u002Fcode> — авторитетная спека не меняется молча.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem ad\"><div class=\"gn\">gate_existing_code<\u002Fdiv><div class=\"gx\">Advisory: символ или Kafka-топик из нового кода уже есть в дереве (Search Before Create). Всегда allow.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem bk\"><div class=\"gn\">gate_scope_guard<\u002Fdiv><div class=\"gx\">Правка кода вне замороженного scope контракта — только через ask (overshoot), журналируется в verdict.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tcol\">\n        <div class=\"tcol-h\"><span class=\"evnum\">3<\u002Fspan>После записи<span class=\"ev2\">PostToolUse<\u002Fspan><\u002Fdiv>\n        <div class=\"gitem as\"><div class=\"gn\">gate_spec_structure<\u002Fdiv><div class=\"gx\">Strict-валидация записанного change; блок только когда он структурно полон, иначе advisory.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem bk\"><div class=\"gn\">gate_lint<\u002Fdiv><div class=\"gx\">Гоняет настроенный линтер из <code>quality-gates.json<\u002Fcode> на записанный файл. Детерминированно — может блокировать.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem ad\"><div class=\"gn\">gate_clean_code<\u002Fdiv><div class=\"gx\">Эвристики: размер файла/функции, вложенность, плейсхолдеры (TODO/FIXME). Advisory — findings в контекст.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tcol\">\n        <div class=\"tcol-h\"><span class=\"evnum\">4<\u002Fspan>Финиш<span class=\"ev2\">Stop<\u002Fspan><\u002Fdiv>\n        <div class=\"gitem bk\"><div class=\"gn\">validate_development_output<\u002Fdiv><div class=\"gx\">Требует полные, без плейсхолдеров, подкреплённые артефакты: <code>journal.md<\u002Fcode>, <code>verification.md<\u002Fcode>, <code>pr-summary.md<\u002Fcode>. Триггер от диска.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem bk\"><div class=\"gn\">gate_build<\u002Fdiv><div class=\"gx\">Сборка — только если реально менялся прод-код (триггер от рабочего дерева, не от сообщения). Под stop-бюджетом.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem inj\"><div class=\"gn\">gate_verdict<\u002Fdiv><div class=\"gx\">Механически пишет <code>verdict.json<\u002Fcode> из реального exit-кода тестов в процессе роутера — агент не может подделать.<\u002Fdiv><\u002Fdiv>\n        <div class=\"gitem bk\"><div class=\"gn\">gate_stage_order · integrity<\u002Fdiv><div class=\"gx\">Stop-инвариант порядка по рабочему дереву + sha256-сверка enforcement-файлов (ловят обход мимо PreToolUse).<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"legend\">\n      <span><i style=\"background:var(--red)\"><\u002Fi> block — детерминированно блокирует<\u002Fspan>\n      <span><i style=\"background:var(--amber)\"><\u002Fi> ask — спрашивает человека<\u002Fspan>\n      <span><i style=\"background:var(--violet)\"><\u002Fi> advisory — только подсказка<\u002Fspan>\n      <span><i style=\"background:var(--mint)\"><\u002Fi> механизм/inject — не блокирует<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 10 · MCP SERVERS -->\n<section class=\"slide\">\n  <div class=\"slide-head\">\n    <div class=\"eyebrow\">Внешний контекст<\u002Fdiv>\n    <h2>MCP-серверы <span style=\"font-size:15px;color:var(--dim);font-weight:500\">— все опциональны, у каждого graceful fallback<\u002Fspan><\u002Fh2>\n    <p class=\"sub\">Репозиторий <strong>не устанавливает<\u002Fstrong> MCP-серверы и <strong>не хранит ключи<\u002Fstrong>. Любой инструмент команда поднимает у себя; без него флоу работает с фолбэком.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"grid g4\" style=\"flex:1;align-content:start\">\n    <div class=\"card\"><span class=\"ic\">🔎<\u002Fspan><h3>Serena<\u002Fh3><p>Семантический поиск символов через LSP — фундамент <strong>Search Before Create<\u002Fstrong>. Java надёжно (Eclipse JDT LS), Kotlin слабее — проверка обязательна.<\u002Fp><p style=\"margin-top:8px;font-size:13px;color:var(--dim)\">Фолбэк: <code style=\"color:var(--mint)\">rg<\u002Fcode> по паттернам.<\u002Fp><\u002Fdiv>\n    <div class=\"card\"><span class=\"ic\">📚<\u002Fspan><h3>Context7<\u002Fh3><p>Свежие доки библиотек (Spring Kafka, kotlinx.coroutines, Reactor, JUnit 5) против галлюцинаций API. По умолчанию выключен.<\u002Fp><p style=\"margin-top:8px;font-size:13px;color:var(--dim)\">Фолбэк: знания модели + ручная проверка.<\u002Fp><\u002Fdiv>\n    <div class=\"card\"><span class=\"ic\">🕸️<\u002Fspan><h3>Graphify<\u002Fh3><p>Граф знаний репозитория; главное — карта событийных потоков <code style=\"color:var(--mint)\">producer → topic → consumer<\u002Fcode>, которой нет в символьном поиске.<\u002Fp><p style=\"margin-top:8px;font-size:13px;color:var(--dim)\">Фолбэк: ручная карта в <code style=\"color:var(--mint)\">journal.md<\u002Fcode>.<\u002Fp><\u002Fdiv>\n    <div class=\"card\"><span class=\"ic\">🧩<\u002Fspan><h3>Atlassian<\u002Fh3><p>Доступ к <strong>Jira / Confluence<\u002Fstrong> — контекст требований и архитектуры. Настраивает команда, токены не в репо. <strong>Код приоритетнее<\u002Fstrong> как источник истины.<\u002Fp><p style=\"margin-top:8px;font-size:13px;color:var(--dim)\">Фолбэк: по коду и вводу; ограничение фиксируется.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"note\">Принцип «есть инструмент — используем, нет — фиксируем как ограничение» держит флоу детерминированным независимо от окружения команды.<\u002Fp>\n<\u002Fsection>\n\n<!-- 11 · DASHBOARD INTRO -->\n<section class=\"slide center\" style=\"justify-content:center\">\n  <div class=\"kicker\"><span class=\"pulse\"><\u002Fspan>Обсервер<\u002Fdiv>\n  <h1>Живой <span class=\"g\">обсервер<\u002Fspan> флоу<\u002Fh1>\n  <p class=\"sub\">Read-only веб-проекция поверх того же журнала <code style=\"color:var(--mint)\">decisions.jsonl<\u002Fcode>. Отвечает на человеческие вопросы: что агент делает сейчас, на каком этапе флоу он находится, какие OpenSpec-доки и артефакты уже созданы — и не застрял ли он.<\u002Fp>\n  <div class=\"demo-banner\">\n    <span class=\"em\">🖥️<\u002Fspan>\n    <div><div class=\"t\">Живое демо обсервера — в конце<\u002Fdiv><div class=\"d\">Сейчас разберём <strong>статичный рендер<\u002Fstrong> с пояснением каждого показателя. Прогон вживую на проекторе покажем на последнем слайде.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tip\">💡 На следующем слайде кликайте по <b style=\"color:var(--violet)\">?<\u002Fb>-маркерам — всплывут пояснения к метрикам.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- 12 · DASHBOARD INTERACTIVE -->\n<section class=\"slide\" style=\"padding:22px 38px 28px\">\n  <div class=\"slide-head\" style=\"margin-bottom:12px\">\n    <div class=\"eyebrow\">Обсервер · разбор показателей<\u002Fdiv>\n    <h2>Дашборд, привязанный к этапу флоу <span style=\"font-size:15px;color:var(--dim);font-weight:500\">— кликай <b style=\"color:var(--violet)\">?<\u002Fb><\u002Fspan><\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"dash\">\n    <div class=\"dash-top\">\n      <div class=\"title\"><span class=\"dot\"><\u002Fspan>GigaCode Observer · <span style=\"color:var(--muted);font-weight:500\">feature/add-card-limit<\u002Fspan><\u002Fdiv>\n      <div class=\"live\"><span class=\"b\"><\u002Fspan>LIVE · snapshot 2s<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"now hot\" data-pop=\"now\">\n      <div><div class=\"l\">Сейчас<\u002Fdiv><div class=\"v\">Фаза <span style=\"color:var(--mint)\">implement<\u002Fspan> · правка <span class=\"file\">CardService.kt<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:right\"><div class=\"l\">Последнее решение гейта<\u002Fdiv><div class=\"v\"><span class=\"badge b-allow\" style=\"margin:0\">gate_lint · allow<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"phases hot\" data-pop=\"phases\">\n      <div class=\"ph done\"><div class=\"nm\">intake<\u002Fdiv><div class=\"st\">✓ approved<\u002Fdiv><\u002Fdiv>\n      <span class=\"ph-sep\">›<\u002Fspan>\n      <div class=\"ph done\"><div class=\"nm\">contract<\u002Fdiv><div class=\"st\">✓ frozen<\u002Fdiv><\u002Fdiv>\n      <span class=\"ph-sep\">›<\u002Fspan>\n      <div class=\"ph done\"><div class=\"nm\">plan<\u002Fdiv><div class=\"st\">✓ specs 3/3<\u002Fdiv><\u002Fdiv>\n      <span class=\"ph-sep\">›<\u002Fspan>\n      <div class=\"ph cur imp\"><div class=\"nm\">implement<\u002Fdiv><div class=\"st\">● активна<\u002Fdiv><\u002Fdiv>\n      <span class=\"ph-sep\">›<\u002Fspan>\n      <div class=\"ph\"><div class=\"nm\">delivery<\u002Fdiv><div class=\"st\">☐ ещё нет<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"row2\">\n      <div class=\"panel hot\" data-pop=\"stagebind\">\n        <div class=\"ph-h\">Привязка фазы → OpenSpec + артефакты<\u002Fdiv>\n        <div class=\"bind\">\n          <div class=\"bindrow done\">\n            <span class=\"bp\">plan ✓<\u002Fspan>\n            <span class=\"bt os\">proposal.md<\u002Fspan><span class=\"bt os\">specs/card<\u002Fspan><span class=\"bt os\">tasks.md 3/5<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"bindrow cur\">\n            <span class=\"bp\">implement ●<\u002Fspan>\n            <span class=\"bt art\">CardService.kt<\u002Fspan><span class=\"bt art\">decisions.jsonl<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"bindrow\">\n            <span class=\"bp\">delivery ☐<\u002Fspan>\n            <span class=\"bt art\">verdict.json<\u002Fspan><span class=\"bt art\">pr-summary.md<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"bind-leg\"><span><b style=\"color:var(--mint)\">▮<\u002Fb> OpenSpec-доки<\u002Fspan><span><b style=\"color:var(--amber)\">▮<\u002Fb> артефакты флоу<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:11px;min-height:0\">\n        <div class=\"panel\">\n          <div class=\"ph-h\">Vital signs<\u002Fdiv>\n          <div class=\"vitals\">\n            <div class=\"vital allow hot\" data-pop=\"allow\"><div class=\"num\">128<\u002Fdiv><div class=\"lbl\">allow<\u002Fdiv><\u002Fdiv>\n            <div class=\"vital ask hot\" data-pop=\"ask\"><div class=\"num\">9<\u002Fdiv><div class=\"lbl\">ask<\u002Fdiv><\u002Fdiv>\n            <div class=\"vital block hot\" data-pop=\"block\"><div class=\"num\">3<\u002Fdiv><div class=\"lbl\">block<\u002Fdiv><\u002Fdiv>\n            <div class=\"vital idle hot\" data-pop=\"idle\"><div class=\"num\">12с<\u002Fdiv><div class=\"lbl\">idle<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel hot\" data-pop=\"budget\">\n          <div class=\"ph-h\">Stop-бюджет<\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;font-size:13px;color:var(--muted)\"><span>израсходовано <b style=\"color:var(--txt)\">2<\u002Fb> из 2<\u002Fspan><span style=\"color:var(--amber)\">на пределе<\u002Fspan><\u002Fdiv>\n          <div class=\"budget-bar\"><i style=\"width:100%\"><\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"panel hot\" data-pop=\"gates\">\n      <div class=\"ph-h\">Прохождение гейтов<\u002Fdiv>\n      <div class=\"gates\">\n        <span class=\"gate allow\"><span class=\"led\"><\u002Fspan>git_guard<\u002Fspan>\n        <span class=\"gate allow\"><span class=\"led\"><\u002Fspan>preflight<\u002Fspan>\n        <span class=\"gate ask\"><span class=\"led\"><\u002Fspan>spec_structure<\u002Fspan>\n        <span class=\"gate allow\"><span class=\"led\"><\u002Fspan>existing_code<\u002Fspan>\n        <span class=\"gate allow\"><span class=\"led\"><\u002Fspan>scope_guard<\u002Fspan>\n        <span class=\"gate allow\"><span class=\"led\"><\u002Fspan>gate_lint<\u002Fspan>\n        <span class=\"gate idle\"><span class=\"led\"><\u002Fspan>build<\u002Fspan>\n        <span class=\"gate idle\"><span class=\"led\"><\u002Fspan>verdict<\u002Fspan>\n        <span class=\"gate idle\"><span class=\"led\"><\u002Fspan>validate_output<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tip\">🖱️ 9 интерактивных точек: «Сейчас», фазы, привязка фазы → OpenSpec/артефакты, allow/ask/block, idle, бюджет, гейты.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- 13 · LIVE DEMO -->\n<section class=\"slide center\" style=\"justify-content:center\">\n  <div class=\"kicker\"><span class=\"pulse\"><\u002Fspan>Время живого демо<\u002Fdiv>\n  <h1>Запускаем <span class=\"g\">обсервер вживую<\u002Fspan><\u002Fh1>\n  <div class=\"demo-stage\">\n    <div class=\"play\">▶<\u002Fdiv>\n    <div style=\"font-size:20px;font-weight:700;color:var(--txt)\">Реальный прогон <code style=\"color:var(--mint);font-family:monospace\">/develop-feature<\u002Fcode> на проекторе<\u002Fdiv>\n    <div class=\"url\">http://127.0.0.1:8787<\u002Fdiv>\n    <p style=\"margin-top:18px;max-width:620px;font-size:14.5px\">Покажем, как фаза переключается на <code style=\"color:var(--mint)\">implement<\u002Fcode>, гейты загораются в реальном времени, <code style=\"color:var(--mint)\">tasks.md<\u002Fcode> набирает прогресс, а на Stop машинный вердикт открывает доставку.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdiv>\n\n<div class=\"dots\" id=\"dots\"><\u002Fdiv>\n<div class=\"hint\">← → или Space · кликай <b style=\"color:var(--violet)\">?<\u002Fb> на дашборде<\u002Fdiv>\n<div class=\"nav\"><button id=\"prev\">‹<\u002Fbutton><button id=\"next\">›<\u002Fbutton><\u002Fdiv>\n\n<div class=\"pop-overlay\" id=\"popOverlay\">\n  <div class=\"pop\" id=\"popBox\">\n    <span class=\"x\" id=\"popClose\">×<\u002Fspan>\n    <div class=\"pk\" id=\"popKicker\">Показатель<\u002Fdiv>\n    <h3 id=\"popTitle\"><\u002Fh3>\n    <div id=\"popBody\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst POPS = {\n  now: {\n    k:\"Зона · Сейчас\", t:\"Что агент делает прямо сейчас\",\n    body:`<p>Живая строка — первое, на что смотрит инженер. Текущая <b>фаза<\u002Fb>, текущий <b>под-шаг<\u002Fb> (например «implement — правка CardService.kt») и <b>последнее решение гейта<\u002Fb>.<\u002Fp>\n    <p>Отвечает на главный вопрос обсервера: <b>идёт прогресс или агент встал?<\u002Fb> Если строка не меняется и растёт idle — пора смотреть, на чём застрял.<\u002Fp>\n    <div class=\"meta\">Источник: текущая фаза из <code>_stage<\u002Fcode> + последняя запись <code>decisions.jsonl<\u002Fcode>. Под-шаг определяется из reason/tool гейта code-edit.<\u002Fdiv>`\n  },\n  phases: {\n    k:\"Зона · Ряд фаз\", t:\"intake → contract → plan → implement → delivery\",\n    body:`<p>Пять фаз флоу. <b>plan и implement — отдельные узлы.<\u002Fb> <code>implement<\u002Fcode> — <b>синтетическая<\u002Fb> фаза: в <code>stages.json<\u002Fcode> её нет, обсервер вставляет её между plan и delivery, выводя из активности code-edit гейтов.<\u002Fp>\n    <p>Каждая фаза окрашена по статусу: <span style=\"color:var(--mint)\">✓ пройдена<\u002Fspan> · <span style=\"color:var(--mint)\">● активна<\u002Fspan> · ☐ ещё нет. verify не отдельный узел — он внутри delivery.<\u002Fp>\n    <div class=\"meta\">Фаза — это «якорь», к которому привязаны её OpenSpec-доки и артефакты (см. блок ниже).<\u002Fdiv>`\n  },\n  stagebind: {\n    k:\"Зона · Привязка фазы\", t:\"Этап ↔ OpenSpec-доки ↔ артефакты\",\n    body:`<p>Ключевое в новом обсервере: каждая фаза флоу <b>привязана к своим документам<\u002Fb>. Видно не просто «какая стадия», а <b>что именно создано на этом этапе<\u002Fb> и где.<\u002Fp>\n    <p>• <b>plan<\u002Fb> → OpenSpec-доки: <code>proposal.md<\u002Fcode>, <code>specs/&lt;cap&gt;<\u002Fcode>, <code>tasks.md<\u002Fcode> с прогрессом <b>N/M<\u002Fb> из чеклиста.<br>\n    • <b>implement<\u002Fb> → правки кода + журнал решений <code>decisions.jsonl<\u002Fcode>.<br>\n    • <b>delivery<\u002Fb> → артефакты доставки: <code>verdict.json<\u002Fcode>, <code>pr-summary.md<\u002Fcode>.<\u002Fp>\n    <p>Чего ещё нет на диске → статус «☐ ещё нет» (не ошибка) — появится вживую при следующем snapshot.<\u002Fp>\n    <div class=\"meta\"><b style=\"color:var(--mint)\">▮ зелёное<\u002Fb> — OpenSpec-change (<code>openspec/changes/&lt;slug&gt;/<\u002Fcode>); <b style=\"color:var(--amber)\">▮ жёлтое<\u002Fb> — артефакты флоу (<code>docs/development/&lt;slug&gt;/<\u002Fcode>). Клик по файлу в обсервере открывает его read-only.<\u002Fdiv>`\n  },\n  allow: {\n    k:\"Vital signs · allow\", t:\"Счётчик разрешённых решений\",\n    body:`<p>Сколько раз гейты пропустили действие агента (<b>allow<\u002Fb>) за прогон. Высокий allow при низком block — здоровый ход: агент работает в рамках, гейты не мешают.<\u002Fp>\n    <div class=\"meta\">Агрегация <code>decisions.jsonl<\u002Fcode> по полю <code>decision<\u002Fcode>. Счётчики живут в vital signs и <b>не дублируются<\u002Fb> в полосе гейтов (там — только последнее решение).<\u002Fdiv>`\n  },\n  ask: {\n    k:\"Vital signs · ask\", t:\"Счётчик «спросить человека»\",\n    body:`<p>Сколько раз гейт остановился и <b>передал решение человеку<\u002Fb> (<b>ask<\u002Fb>) — например запись в <code>openspec/specs<\u002Fcode> или в archive. Это не ошибка: это точки, где процесс намеренно требует подтверждения.<\u002Fp>\n    <div class=\"meta\">Типичные источники ask: <code>git_guard<\u002Fcode> на <code>openspec/specs<\u002Fcode>, <code>gate_spec_structure<\u002Fcode> на прямую правку авторитетной спеки.<\u002Fdiv>`\n  },\n  block: {\n    k:\"Vital signs · block\", t:\"Счётчик заблокированных действий\",\n    body:`<p>Сколько раз гейт <b>жёстко заблокировал<\u002Fb> действие (<b>block<\u002Fb>): защищённая ветка, невалидная спека, красный билд, неполные артефакты на Stop. Блок детерминированный — чинит сам агент.<\u002Fp>\n    <p>Block — это «предохранитель сработал». Несколько block за прогон нормальны; важно, что они <b>не прорываются<\u002Fb>.<\u002Fp>\n    <div class=\"meta\">Stop-блоки <b>постоянны<\u002Fb> — без автодеградации после N попыток. Застрявший гейт разрешается человеком через escape hatch <code>disableAllHooks<\u002Fcode>.<\u002Fdiv>`\n  },\n  idle: {\n    k:\"Vital signs · idle\", t:\"Простой — давно ли была активность\",\n    body:`<p>Сколько секунд назад было <b>последнее решение<\u002Fb>. Главный сигнал «жив ли прогон». Маленький idle — агент активно работает; растущий idle на фоне неизменной строки «Сейчас» — агент <b>завис или ждёт<\u002Fb>.<\u002Fp>\n    <div class=\"meta\">Считается по <b>wall-clock сервера<\u002Fb> (это чтение, не запись — read-only инвариант сохраняется).<\u002Fdiv>`\n  },\n  budget: {\n    k:\"Зона · Stop-бюджет\", t:\"Сколько блокировок осталось\",\n    body:`<p>На стадии Stop у агента есть <b>бюджет блоков<\u002Fb> (<code>stop_block_budget<\u002Fcode>, в нашем конфиге = <b>2<\u002Fb>). Каждый block на доставке расходует попытку. Полоса показывает израсходовано / остаток.<\u002Fp>\n    <p>Это видимый счётчик попыток самоисправления. Важно: блок при этом <b>не деградирует в allow<\u002Fb> — выход из цикла всегда через человека, а не через исчерпание бюджета.<\u002Fp>\n    <div class=\"meta\">Лимит из <code>router.config.json<\u002Fcode> · <code>stop_block_budget<\u002Fcode>. Бюджет ограничивает <b>попытки самоисправления<\u002Fb>, не ослабляет сам гейт.<\u002Fdiv>`\n  },\n  gates: {\n    k:\"Зона · Полоса гейтов\", t:\"Последнее решение по каждому гейту\",\n    body:`<p>Каждый гейт пайплайна окрашен по <b>последнему<\u002Fb> решению: <span style=\"color:var(--mint)\">allow<\u002Fspan> · <span style=\"color:var(--amber)\">ask<\u002Fspan> · <span style=\"color:var(--red)\">block<\u002Fspan> · <span style=\"color:#8893ad\">серый — не запускался<\u002Fspan>.<\u002Fp>\n    <p>Мгновенная картина «где мы по гейтам»: <code>build<\u002Fcode>, <code>verdict<\u002Fcode>, <code>validate_output<\u002Fcode> серые → стадия delivery ещё не дошла. <code>spec_structure<\u002Fcode> жёлтый → было подтверждение по спеке.<\u002Fp>\n    <div class=\"meta\">Без счётчиков — только цвет последнего решения (счётчики в vital signs). Порядок фиксирован по <code>GATE_ORDER<\u002Fcode> пайплайна.<\u002Fdiv>`\n  }\n};\n\nconst slides = Array.from(document.querySelectorAll('.slide'));\nconst total = slides.length;\nlet idx = 0;\ndocument.getElementById('tot').textContent = total;\nconst dotsWrap = document.getElementById('dots');\nslides.forEach((_,i)=>{ const d=document.createElement('i'); d.onclick=()=>go(i); dotsWrap.appendChild(d); });\nconst dots = Array.from(dotsWrap.children);\nfunction go(n){\n  idx = Math.max(0, Math.min(total-1, n));\n  slides.forEach((s,i)=>s.classList.toggle('active', i===idx));\n  dots.forEach((d,i)=>d.classList.toggle('on', i===idx));\n  document.getElementById('cur').textContent = idx+1;\n  document.getElementById('fill').style.width = ((idx)/(total-1)*100)+'%';\n  slides[idx].scrollTop = 0;\n}\nfunction next(){ go(idx+1); }\nfunction prev(){ go(idx-1); }\ndocument.getElementById('next').onclick = next;\ndocument.getElementById('prev').onclick = prev;\ndocument.addEventListener('keydown', e=>{\n  if(document.getElementById('popOverlay').classList.contains('show')){ if(e.key==='Escape') closePop(); return; }\n  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); next(); }\n  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }\n  else if(e.key==='Home'){ go(0); } else if(e.key==='End'){ go(total-1); }\n});\nconst ov=document.getElementById('popOverlay');\nfunction openPop(key){\n  const p=POPS[key]; if(!p) return;\n  document.getElementById('popKicker').textContent=p.k;\n  document.getElementById('popTitle').textContent=p.t;\n  document.getElementById('popBody').innerHTML=p.body;\n  ov.classList.add('show');\n}\nfunction closePop(){ ov.classList.remove('show'); }\ndocument.getElementById('popClose').onclick=closePop;\nov.addEventListener('click', e=>{ if(e.target===ov) closePop(); });\ndocument.querySelectorAll('.hot[data-pop]').forEach(el=>{ el.addEventListener('click', ()=>openPop(el.dataset.pop)); });\nfunction fit(){ const s=Math.min(window.innerWidth/1280, window.innerHeight/720); document.getElementById('deck').style.setProperty('--scale', s); }\nwindow.addEventListener('resize', fit); fit();\ngo(0);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
</body>
