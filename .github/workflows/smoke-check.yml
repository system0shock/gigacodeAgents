name: smoke-check

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Analytics module smoke check
        run: bash modules/analytics/scripts/smoke-check.sh
      - name: Development module smoke check
        run: bash modules/development/scripts/smoke-check.sh
